<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1: Basic JWT Authentication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .container { width: 400px; padding: 20px; }
        h1 { text-align: center; margin-bottom: 8px; color: #38bdf8; font-size: 1.5rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            border: 1px solid #334155; border-radius: 8px; background: #1e293b;
            color: #94a3b8; transition: all 0.2s;
        }
        .tab.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }

        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 0.85rem; }
        input {
            width: 100%; padding: 10px 12px; border: 1px solid #334155;
            border-radius: 8px; background: #1e293b; color: #e2e8f0;
            font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #38bdf8; }

        button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: #38bdf8; color: #0f172a; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #7dd3fc; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .message {
            margin-top: 12px; padding: 10px; border-radius: 8px;
            font-size: 0.85rem; display: none;
        }
        .message.success { display: block; background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
        .message.error { display: block; background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }

        .profile-card {
            display: none; background: #1e293b; border-radius: 12px;
            padding: 24px; text-align: center; border: 1px solid #334155;
        }
        .profile-card.visible { display: block; }
        .profile-card h2 { color: #38bdf8; margin-bottom: 12px; }
        .profile-card p { color: #94a3b8; margin-bottom: 8px; }
        .profile-card .token-preview {
            background: #0f172a; padding: 8px; border-radius: 6px;
            font-family: monospace; font-size: 0.7rem; color: #64748b;
            word-break: break-all; margin: 12px 0;
        }
        .btn-secondary {
            background: #334155; color: #e2e8f0; margin-top: 12px;
        }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #991b1b; color: #fca5a5; margin-top: 8px; }
        .btn-danger:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JWT Authentication</h1>
        <p class="subtitle">Project 1 — Basic</p>

        <!-- Auth Forms -->
        <div id="auth-section">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>
                <button type="submit">Login</button>
            </form>

            <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Choose password">
                </div>
                <button type="submit">Register</button>
            </form>

            <div id="auth-message" class="message"></div>
        </div>

        <!-- Profile (shown after login) -->
        <div id="profile-section" class="profile-card">
            <h2 id="profile-username"></h2>
            <p id="profile-email"></p>
            <p id="profile-id" style="font-size:0.8rem"></p>
            <div class="token-preview" id="token-preview"></div>
            <button class="btn-secondary" onclick="fetchProtected()">Test Protected Route</button>
            <div id="protected-message" class="message" style="margin-top:8px"></div>
            <button class="btn-danger" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000/api";
        let token = null;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('auth-message').className = 'message';

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
            }
        }

        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `message ${type}`;
        }

        async function handleRegister(e) {
            e.preventDefault();
            try {
                const res = await fetch(`${API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("reg-username").value,
                        email: document.getElementById("reg-email").value,
                        password: document.getElementById("reg-password").value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Registration failed");
                showMessage("auth-message", "Registration successful! You can now login.", "success");
                switchTab("login");
            } catch (err) {
                showMessage("auth-message", err.message, "error");
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("login-username").value,
                        password: document.getElementById("login-password").value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Login failed");
                token = data.access_token;
                showProfile();
            } catch (err) {
                showMessage("auth-message", err.message, "error");
            }
        }

        async function showProfile() {
            try {
                const res = await fetch(`${API}/me`, {
                    headers: { "Authorization": `Bearer ${token}` },
                });
                const user = await res.json();
                document.getElementById("profile-username").textContent = user.username;
                document.getElementById("profile-email").textContent = user.email;
                document.getElementById("profile-id").textContent = `User ID: ${user.id}`;
                document.getElementById("token-preview").textContent = `Token: ${token.substring(0, 50)}...`;
                document.getElementById("auth-section").style.display = "none";
                document.getElementById("profile-section").classList.add("visible");
            } catch (err) {
                showMessage("auth-message", "Failed to load profile", "error");
            }
        }

        async function fetchProtected() {
            try {
                const res = await fetch(`${API}/protected`, {
                    headers: { "Authorization": `Bearer ${token}` },
                });
                const data = await res.json();
                showMessage("protected-message", data.message, "success");
            } catch (err) {
                showMessage("protected-message", "Access denied", "error");
            }
        }

        function logout() {
            token = null;
            document.getElementById("auth-section").style.display = "block";
            document.getElementById("profile-section").classList.remove("visible");
            document.getElementById("auth-message").className = "message";
            document.getElementById("protected-message").className = "message";
        }
    </script>
</body>
</html>
