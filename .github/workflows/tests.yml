name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-project-1:
    name: Project 1 — Basic JWT (45 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: project-1-basic/backend
        run: |
          pip install -r requirements.txt pytest httpx
      - name: Run tests
        working-directory: project-1-basic/backend
        run: pytest test_project1.py -v

  test-project-2:
    name: Project 2 — RS256 RBAC (58 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: project-2-medium/backend/auth_server
        run: |
          pip install -r requirements.txt pytest httpx
      - name: Run tests
        working-directory: project-2-medium/backend/auth_server
        run: pytest test_project2.py -v

  test-project-3:
    name: Project 3 — Agentic RAG (62 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: project-3-advanced/backend
        run: |
          pip install -r requirements.txt pytest httpx
      - name: Run tests
        working-directory: project-3-advanced/backend
        env:
          SECRET_KEY: test-ci-secret
          OPENAI_API_KEY: ""
        run: pytest test_project3.py -v

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
